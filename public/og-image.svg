<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#FFFFFF"/>
  <rect width="1200" height="630" fill="url(#gradient)"/>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F0F0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Logo Box -->
  <rect x="80" y="80" width="80" height="80" rx="20" fill="#000000"/>
  <text x="120" y="132" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Q</text>
  
  <!-- Brand Name -->
  <text x="180" y="132" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="bold" fill="#000000">QRMenu.pk</text>
  
  <!-- Tagline -->
  <text x="80" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="bold" fill="#000000">Digital Menu for</text>
  <text x="80" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="bold" fill="#000000">Every Restaurant</text>
  
  <!-- Subtitle -->
  <text x="80" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#666666">Pakistan's #1 QR-based menu platform</text>
  
  <!-- Features -->
  <text x="80" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#888888">✓ Free QR Code Menu  ✓ WhatsApp Orders  ✓ No Commission</text>
  
  <!-- CTA -->
  <rect x="80" y="480" width="280" height="60" rx="12" fill="#25D366"/>
  <text x="220" y="518" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Start Free Trial</text>
  
  <!-- QR Code Visual -->
  <rect x="850" y="150" width="250" height="250" rx="20" fill="#FFFFFF" stroke="#E8E8E8" stroke-width="2"/>
  <rect x="880" y="180" width="60" height="60" rx="8" fill="#000000"/>
  <rect x="880" y="260" width="60" height="60" rx="8" fill="#000000"/>
  <rect x="880" y="340" width="60" height="60" rx="8" fill="#000000"/>
  <rect x="960" y="180" width="60" height="60" rx="8" fill="#000000"/>
  <rect x="960" y="340" width="60" height="60" rx="8" fill="#000000"/>
  <rect x="1040" y="180" width="60" height="60" rx="8" fill="#000000"/>
  <rect x="1040" y="260" width="60" height="60" rx="8" fill="#000000"/>
  <rect x="1040" y="340" width="60" height="60" rx="8" fill="#000000"/>
  
  <!-- Bottom Bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#000000"/>
  <text x="600" y="612" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">Scan • Browse • Order on WhatsApp</text>
</svg>
