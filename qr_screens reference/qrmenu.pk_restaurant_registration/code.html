<!-- Restaurant Name -->
<div class="space-y-1.5">
<label class="block font-label-md text-label-md text-deep-black">Restaurant Name *</label>
<input class="w-full h-12 px-stack-md bg-input-bg border border-input-border rounded-10px focus:ring-1 focus:ring-deep-black focus:border-deep-black transition-all font-body-md text-body-md outline-none" placeholder="Al-Habib Grill" type="text"/>
</div>
<!-- City -->
<div class="space-y-1.5">
<label class="block font-label-md text-label-md text-deep-black">City *</label>
<input class="w-full h-12 px-stack-md bg-input-bg border border-input-border rounded-10px focus:ring-1 focus:ring-deep-black focus:border-deep-black transition-all font-body-md text-body-md outline-none" placeholder="Lahore" type="text"/>
</div>
<!-- Phone / WhatsApp -->
<div class="space-y-1.5">

<input class="w-full h-12 px-stack-md bg-input-bg border border-input-border rounded-10px focus:ring-1 focus:ring-deep-black focus:border-deep-black transition-all font-body-md text-body-md outline-none" placeholder="0300-XXXXXXX" type="tel"/>
</div>

</div>
<!-- Password -->

<label class="block font-label-md text-label-md text-deep-black">Password *</label>
<input class="w-full h-12 px-stack-md bg-input-bg border border-input-border rounded-10px focus:ring-1 focus:ring-deep-black focus:border-deep-black transition-all font-body-md text-body-md outline-none" placeholder="At least 6 characters" type="password"/>
</div>
<!-- Primary CTA -->
<button class="w-full h-12 bg-deep-black text-pure-white font-label-md text-label-md rounded-10px hover:opacity-90 active:scale-[0.98] transition-all duration-200 mt-2" type="submit">

<script>
        // Simple input focus micro-interactions
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').style.color = '#000000';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').style.color = '';
            });
        });
    </script>
